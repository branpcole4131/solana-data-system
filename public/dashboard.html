<!DOCTYPE html>
<html>
<head>
  <title>Solana Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    canvas {
      max-width: 900px;
      margin: 20px auto;
    }
  </style>
</head>
<body>

<h1>Solana Market Dashboard</h1>

<canvas id="priceChart"></canvas>

<script>
async function loadData() {
  const res = await fetch("../data/solana-history.json");
  const data = await res.json();

  const labels = data.map(d => new Date(d.timestamp).toLocaleTimeString());
  const prices = data.map(d => d.price);

  const ctx = document.getElementById("priceChart");

  new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "SOL Price",
        data: prices,
        borderWidth: 2
      }]
    }
  });
}

loadData();
</script>

</body>
</html>
